<!DOCTYPE html>
<html>
<head>

    <title>Edit Lead</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="text-center mb-4">
    Edit Lead
</h2>

<form method="POST">

{% csrf_token %}

<!-- Lead Type -->

<label class="form-label">Lead Type</label>

<select class="form-select mb-3" name="lead_type">

    <option value="Contact Us" {% if lead.lead_type == "Contact Us" %}selected{% endif %}>
        Contact Us
    </option>

    <option value="Enquire Now" {% if lead.lead_type == "Enquire Now" %}selected{% endif %}>
        Enquire Now
    </option>

    <option value="Request Demo" {% if lead.lead_type == "Request Demo" %}selected{% endif %}>
        Request Demo
    </option>

</select>

<!-- Source -->

<label class="form-label">Source</label>

<input
    type="text"
    name="source"
    class="form-control mb-3"
    value="{{ lead.source }}"
    placeholder="Enter Source">

<!-- Status -->

<label class="form-label">Status</label>

<select class="form-select mb-3" name="status">

    <option value="New" {% if lead.status == "New" %}selected{% endif %}>New</option>

    <option value="Contacted" {% if lead.status == "Contacted" %}selected{% endif %}>Contacted</option>

    <option value="Qualified" {% if lead.status == "Qualified" %}selected{% endif %}>Qualified</option>

    <option value="Interested" {% if lead.status == "Interested" %}selected{% endif %}>Interested</option>

    <option value="Converted" {% if lead.status == "Converted" %}selected{% endif %}>Converted</option>

    <option value="Lost" {% if lead.status == "Lost" %}selected{% endif %}>Lost</option>

</select>

<!-- Assigned To -->

<label class="form-label">Assigned To</label>

<input
    type="text"
    name="assigned_to"
    class="form-control mb-3"
    value="{{ lead.assigned_to }}"
    placeholder="Enter Employee Name">

<!-- Name -->

<label class="form-label">Name</label>

<input
    class="form-control mb-3"
    name="name"
    value="{{ lead.name }}"
    placeholder="Enter Name"
    required>

<!-- Email -->

<label class="form-label">Email</label>

<input
    class="form-control mb-3"
    type="email"
    name="email"
    value="{{ lead.email }}"
    placeholder="Enter Email"
    required>

<!-- Mobile -->

<label class="form-label">Mobile</label>

<input
    class="form-control mb-3"
    name="mobile"
    value="{{ lead.mobile }}"
    placeholder="Enter Mobile Number"
    required>

<!-- Company -->

<label class="form-label">Company</label>

<input
    class="form-control mb-3"
    name="company"
    value="{{ lead.company }}"
    placeholder="Enter Company Name">

<!-- Message -->

<label class="form-label">Message</label>

<textarea
    class="form-control mb-3"
    name="message"
    placeholder="Enter Message">{{ lead.message }}</textarea>

<!-- Buttons -->

<button type="submit" class="btn btn-success">
    Update Lead
</button>

<a href="{% url 'lead_list' %}" class="btn btn-secondary">
    Cancel
</a>

</form>

</body>
</html>
