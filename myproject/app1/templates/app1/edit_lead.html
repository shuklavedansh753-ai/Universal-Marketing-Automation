<!DOCTYPE html>
<html>
<head>

    <title>Edit Lead</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2 class="text-center mb-4">

Edit Lead

</h2>

<form method="POST">

{% csrf_token %}

<label>Lead Type</label>

<select class="form-select mb-3" name="lead_type">

<option value="Contact Us" {% if lead.lead_type == "Contact Us" %}selected{% endif %}>Contact Us</option>

<option value="Enquire Now" {% if lead.lead_type == "Enquire Now" %}selected{% endif %}>Enquire Now</option>

<option value="Request Demo" {% if lead.lead_type == "Request Demo" %}selected{% endif %}>Request Demo</option>

</select>

<label>Status</label>

<select class="form-select mb-3" name="status">

<option value="New" {% if lead.status == "New" %}selected{% endif %}>New</option>

<option value="Contacted" {% if lead.status == "Contacted" %}selected{% endif %}>Contacted</option>

<option value="Qualified" {% if lead.status == "Qualified" %}selected{% endif %}>Qualified</option>

<option value="Converted" {% if lead.status == "Converted" %}selected{% endif %}>Converted</option>

<option value="Lost" {% if lead.status == "Lost" %}selected{% endif %}>Lost</option>

</select>

<input class="form-control mb-3" name="name" value="{{ lead.name }}" required>

<input class="form-control mb-3" type="email" name="email" value="{{ lead.email }}" required>

<input class="form-control mb-3" name="mobile" value="{{ lead.mobile }}" required>

<input class="form-control mb-3" name="company" value="{{ lead.company }}">

<textarea class="form-control mb-3" name="message">{{ lead.message }}</textarea>

<button class="btn btn-success">
    Update Lead
</button>

<a href="{% url 'lead_list' %}" class="btn btn-secondary">
    Cancel
</a>

</form>

</body>
</html>
