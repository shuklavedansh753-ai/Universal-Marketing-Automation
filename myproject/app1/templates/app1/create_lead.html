{% load static %}
<!DOCTYPE html>
<html>
<head>

<title>Marketing Widget</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#f2f2f2;
}

#openWidget{

position:fixed;

bottom:20px;

right:20px;

width:70px;

height:70px;

border-radius:50%;

font-size:30px;

border:none;

background:#0d6efd;

color:white;

cursor:pointer;

box-shadow:0 0 15px gray;

}

#widget{

display:none;

position:fixed;

bottom:100px;

right:20px;

width:380px;

background:white;

padding:20px;

border-radius:10px;

box-shadow:0 0 20px gray;

}

</style>

</head>

<body>

<button id="openWidget">

💬

</button>

<div id="widget">

<h4 class="text-center">

Marketing Widget

</h4>

<hr>

<form method="POST">

{% csrf_token %}

<select
class="form-select mb-3"
name="lead_type">

<option>

Contact Us

</option>

<option>

Enquire Now

</option>

<option>

Request Demo

</option>

</select>

<input
class="form-control mb-3"
name="name"
placeholder="Full Name"
required>

<input
class="form-control mb-3"
type="email"
name="email"
placeholder="Email"
required>

<input
class="form-control mb-3"
name="mobile"
placeholder="Mobile"
required>

<input
class="form-control mb-3"
name="company"
placeholder="Company">

<textarea
class="form-control mb-3"
name="message"
placeholder="Message"></textarea>

<!-- WhatsApp Button -->
<a
href="https://wa.me/919876543210"
target="_blank"
onclick="saveEvent('WhatsApp Click')"
class="btn btn-success w-100 mb-2">
WhatsApp
</a>
    <!-- Email Button -->
<a
href="mailto:info@gmail.com"
onclick="saveEvent('Email Click')"
class="btn btn-warning w-100 mb-2">
Email Us
</a>
    <!-- Request Callback Button -->
<button
type="button"
class="btn btn-info w-100 mb-2"
onclick="callback()">

Request Callback

</button>
    <!-- Submit Button -->
<button
type="submit"
class="btn btn-primary w-100">
    Submit
</button>

</form>

</div>

<script>

const button=document.getElementById("openWidget");
const widget=document.getElementById("widget");

function saveEvent(eventName){

fetch("/api/leads/track/",{

method:"POST",

headers:{

"X-CSRFToken":"{{ csrf_token }}",

"Content-Type":"application/x-www-form-urlencoded",

},

body:"event_name="+eventName

});

}

button.onclick=function(){

if(widget.style.display=="block"){

widget.style.display="none";

saveEvent("Widget Closed");

}

else{

widget.style.display="block";

saveEvent("Widget Opened");

}

}

function callback(){

saveEvent("Callback Click");

alert("Our team will call you shortly.");

}

</script>

<script>

function trackEvent(name){

console.log(name);

}

function callback(){

trackEvent("Callback Click");

alert("Our team will call you shortly.");

}

</script>
<script src="{% static 'app1/js/widget.js' %}"></script>
</body>
</html>
